<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sit&Joy · Café de especialidad y brunch en Alicante</title>
    <meta name="description" content="Sit&Joy es una cafetería en Alicante especializada en café de especialidad y brunch artesanal. Disfruta de desayunos únicos en un ambiente moderno y acogedor." />
    <link rel="icon" href="/favicon.ico" />
    
    <!-- Preconnect para Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    
    <!-- CSS crítico inline para evitar FOUC -->
    <style>
      :root {
        --cream: #F5F1EB;
        --beige: #E8DCCB;
        --coffee: #6B4F3A;
        --coffee-dark: #2B2B2B;
        --off-white: #FAFAF7;
        --background: var(--off-white);
        --foreground: var(--coffee-dark);
      }
      body {
        background-color: var(--background);
        color: var(--foreground);
        font-family: 'Inter', system-ui, sans-serif;
        margin: 0;
        padding: 0;
        -webkit-font-smoothing: antialiased;
      }
      #root {
        min-height: 100vh;
      }
    </style>
    
    <!-- Cargar CSS principal antes de JavaScript -->
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
